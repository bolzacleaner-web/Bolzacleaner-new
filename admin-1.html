<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLZACLEANER - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .login-container { background: #1e293b; padding: 40px; border-radius: 12px; border: 2px solid #14b8a6; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(20, 184, 166, 0.2); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #14b8a6; font-size: 28px; margin-bottom: 10px; }
        .login-header p { color: #cbd5e1; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #cbd5e1; margin-bottom: 8px; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; background: #0f172a; border: 2px solid #334155; color: white; border-radius: 6px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #14b8a6; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-primary { background: #14b8a6; color: #0f172a; width: 100%; }
        .btn-primary:hover { background: #0d9488; }
        
        .error { color: #ef4444; font-size: 14px; margin-top: 10px; text-align: center; }
        
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        .admin-header { background: #1e293b; padding: 20px 30px; border-bottom: 2px solid #14b8a6; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h2 { color: #14b8a6; }
        .btn-logout { background: #ef4444; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-logout:hover { background: #dc2626; }
        
        .admin-content { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 8px; border-left: 4px solid #14b8a6; }
        .stat-card h3 { color: #14b8a6; margin-bottom: 10px; font-size: 14px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #14b8a6; }
        
        .appointments-section { background: #1e293b; padding: 30px; border-radius: 8px; }
        .appointments-section h3 { color: #14b8a6; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; overflow-x: auto; }
        th { background: #0f172a; color: #14b8a6; padding: 12px; text-align: left; border-bottom: 2px solid #14b8a6; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 12px; }
        tr:hover { background: #0d3d3a; }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            table { font-size: 11px; }
            th, td { padding: 8px; font-size: 11px; }
            .appointments-section { padding: 15px; }
        }
        
        /* Très petit écran */
        @media (max-width: 480px) {
            table { font-size: 9px; }
            th, td { padding: 6px; font-size: 9px; }
            .appointments-section { padding: 10px; overflow-x: auto; }
        }
        
        .booking-card {
            background: #1e293b;
            border-left: 4px solid #14b8a6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .booking-card h4 {
            color: #14b8a6;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .booking-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
        }
        
        .booking-info-item {
            padding: 8px;
            background: #0f172a;
            border-radius: 4px;
        }
        
        .booking-info-label {
            color: #94a3b8;
            font-weight: bold;
            font-size: 12px;
        }
        
        .booking-info-value {
            color: #14b8a6;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <!-- LOGIN FORM -->
    <div class="login-container" id="loginForm">
        <div class="login-header">
            <h1>🔐 BOLZACLEANER</h1>
            <p>Admin Panel - Accesso Riservato</p>
        </div>
        
        <div class="form-group">
            <label for="password">Password Admin:</label>
            <input type="password" id="password" placeholder="Inserisci password" onkeypress="if(event.key==='Enter') loginAdmin();">
        </div>
        
        <button class="btn btn-primary" onclick="loginAdmin()">🔓 Accedi</button>
        
        <div id="loginError" class="error hidden"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="admin-header">
            <h2>📊 Admin Panel - BOLZACLEANER</h2>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
        
        <div class="admin-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>📅 Prenotazioni</h3>
                    <div class="value" id="totalBookings">0</div>
                </div>
                <div class="stat-card">
                    <h3>👥 Clienti</h3>
                    <div class="value" id="totalClients">0</div>
                </div>
            </div>
            
            <div class="appointments-section">
                <h3>📋 Elenco Prenotazioni (Aggiornamento ogni 5 secondi)</h3>
                <div id="bookingsCards" style="display: flex; flex-direction: column; gap: 15px;">
                </div>
                <p id="noBookings" style="text-align: center; color: #94a3b8; margin-top: 20px;">
                    Nessuna prenotazione ancora...
                </p>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'bolza2024';
        const SESSION_KEY = 'bolzacleaner_admin_session';
        const SESSION_DURATION = 3600000;
        
        window.addEventListener('load', function() {
            checkSession();
            loadBookings();
        });
        
        function checkSession() {
            const session = localStorage.getItem(SESSION_KEY);
            if (session) {
                const sessionTime = parseInt(session);
                const now = new Date().getTime();
                
                if (now - sessionTime < SESSION_DURATION) {
                    showDashboard();
                } else {
                    localStorage.removeItem(SESSION_KEY);
                    showLoginForm();
                }
            } else {
                showLoginForm();
            }
        }
        
        function loginAdmin() {
            const password = document.getElementById('password').value.trim();
            
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem(SESSION_KEY, new Date().getTime().toString());
                showDashboard();
                loadBookings();
            } else {
                const errorDiv = document.getElementById('loginError');
                errorDiv.textContent = '❌ Password non corretta!';
                errorDiv.classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        }
        
        function handleLogin(event) {
            event.preventDefault();
            loginAdmin();
        }
        
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('dashboard').classList.remove('active');
        }
        
        function showDashboard() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }
        
        function logout() {
            localStorage.removeItem(SESSION_KEY);
            showLoginForm();
            document.getElementById('password').value = '';
        }
        
        function loadBookings() {
            // Charger les réservations depuis localStorage
            const bookings = JSON.parse(localStorage.getItem('bolzaAppointments')) || [];
            
            document.getElementById('totalBookings').textContent = bookings.length;
            document.getElementById('totalClients').textContent = new Set(bookings.map(b => b.email)).size;
            
            const cardsDiv = document.getElementById('bookingsCards');
            cardsDiv.innerHTML = '';
            
            if (bookings.length === 0) {
                document.getElementById('noBookings').style.display = 'block';
            } else {
                document.getElementById('noBookings').style.display = 'none';
                
                // Afficher les réservations les plus récentes en premier
                bookings.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                
                bookings.forEach(booking => {
                    try {
                        const dateObj = new Date(booking.createdAt || new Date());
                        const dateStr = dateObj.toLocaleDateString('it-IT') + ' ' + dateObj.toLocaleTimeString('it-IT').substring(0, 5);
                        const total = typeof booking.total === 'number' ? booking.total.toFixed(2) : '0.00';
                        
                        const card = document.createElement('div');
                        card.className = 'booking-card';
                        card.innerHTML = `
                            <h4>👤 ${booking.fullName || 'Non specificato'}</h4>
                            <div class="booking-info">
                                <div class="booking-info-item">
                                    <div class="booking-info-label">🏠 Servizio</div>
                                    <div class="booking-info-value">${booking.service || 'N/A'}</div>
                                </div>
                                <div class="booking-info-item">
                                    <div class="booking-info-label">📧 Email</div>
                                    <div class="booking-info-value">${booking.email || 'N/A'}</div>
                                </div>
                                <div class="booking-info-item">
                                    <div class="booking-info-label">📞 Telefono</div>
                                    <div class="booking-info-value">${booking.phone || 'N/A'}</div>
                                </div>
                                <div class="booking-info-item">
                                    <div class="booking-info-label">💰 Totale</div>
                                    <div class="booking-info-value">€${total}</div>
                                </div>
                                <div class="booking-info-item">
                                    <div class="booking-info-label">📍 Indirizzo</div>
                                    <div class="booking-info-value">${booking.address || 'N/A'}, ${booking.city || 'N/A'}</div>
                                </div>
                                <div class="booking-info-item">
                                    <div class="booking-info-label">💳 Pagamento</div>
                                    <div class="booking-info-value">${booking.payment || 'N/A'}</div>
                                </div>
                                <div class="booking-info-item">
                                    <div class="booking-info-label">📅 Data Servizio</div>
                                    <div class="booking-info-value">${booking.date || 'N/A'} ${booking.time || 'N/A'}</div>
                                </div>
                                <div class="booking-info-item">
                                    <div class="booking-info-label">⏰ Confermata</div>
                                    <div class="booking-info-value">${dateStr}</div>
                                </div>
                            </div>
                        `;
                        cardsDiv.appendChild(card);
                    } catch(e) {
                        console.error('Errore visualizzazione prenotazione:', e);
                    }
                });
            }
        }
        
        setInterval(loadBookings, 5000);
    </script>

</body>
</html>
